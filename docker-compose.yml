version: "3.9"

services:
  db:
    image: postgres:16
    container_name: deskflow_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: deskflow
      POSTGRES_PASSWORD: deskflow
      POSTGRES_DB: deskflow
    ports:
      - "5432:5432"
    volumes:
      - deskflow_db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: deskflow_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  deskflow_db_data:
